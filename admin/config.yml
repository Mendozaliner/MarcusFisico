# Uses GitHub login via Netlify’s OAuth proxy — no Netlify Identity / Git Gateway required.
# Setup: ADMIN-OAUTH.md in the repo root.

backend:
  name: github
  repo: Mendozaliner/MarcusFisico
  branch: main
  base_url: https://api.netlify.com
  # Must be "auth" (→ https://api.netlify.com/auth), not "oauth" — wrong path breaks GitHub login
  auth_endpoint: auth

site_url: https://reliable-youtiao-2f57d2.netlify.app
display_url: https://reliable-youtiao-2f57d2.netlify.app

media_folder: assets/uploads
public_folder: /assets/uploads

collections:
  - name: rankings
    label: Wine rankings
    files:
      - label: Rankings table
        name: rankings
        file: content/rankings.json
        fields:
          - label: Wines (the site sorts by score, highest first)
            name: items
            widget: list
            summary: "{{fields.wine}} ({{fields.score}})"
            fields:
              - { label: Wine, name: wine, widget: string }
              - { label: Notes, name: notes, widget: text }
              - { label: Pairings, name: pairings, widget: text }
              - label: Score
                name: score
                widget: number
                value_type: int
                min: 0
                max: 100

  - name: reviews
    label: Winery reviews
    files:
      - label: All reviews
        name: reviews
        file: content/reviews.json
        fields:
          - label: Reviews (order shown top to bottom on the page)
            name: items
            widget: list
            summary: "{{fields.title}}"
            fields:
              - label: Winery name
                name: title
                widget: string
              - label: Region
                name: region
                widget: string
                hint: "e.g. Okanagan, Naramata"
              - label: Month
                name: month
                widget: string
                hint: "e.g. March"
              - label: Year
                name: year
                widget: string
                hint: "e.g. 2026"
              - label: Meta line (legacy, optional)
                name: meta
                widget: string
                required: false
                hint: "Used in header only if Region, Month, and Year are all empty"
              - label: Property
                name: property
                widget: number
                value_type: int
                min: 1
                max: 5
              - label: Wine
                name: wine
                widget: number
                value_type: int
                min: 1
                max: 5
              - label: Service
                name: service
                widget: number
                value_type: int
                min: 1
                max: 5
              - label: Prices
                name: prices
                widget: number
                value_type: int
                min: 1
                max: 5
              - { label: Body, name: body, widget: text }
              - label: Photo 1 (shown when review is expanded)
                name: photo1
                widget: image
                required: false
              - label: Photo 2
                name: photo2
                widget: image
                required: false
              - label: Photo 3
                name: photo3
                widget: image
                required: false
              - label: URL slug (optional)
                name: slug
                widget: string
                required: false
                hint: "Short id for anchor links; leave blank to auto-generate from title"
