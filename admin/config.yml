# Use DecapBridge PKCE auth
backend:
  name: git-gateway
  repo: Mendozaliner/MarcusFisico
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/88af54a5-9d23-4cd8-8930-07824a12c0ba/pkce
  auth_token_endpoint: /sites/88af54a5-9d23-4cd8-8930-07824a12c0ba/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg
site_url: https://mendozaliner.github.io/MarcusFisico
display_url: https://mendozaliner.github.io/MarcusFisico

media_folder: assets/uploads
public_folder: assets/uploads

collections:
  - name: rankings
    label: Wine rankings
    files:
      - label: Rankings table
        name: rankings
        file: content/rankings.json
        fields:
          - label: Wines (the site sorts by score, highest first)
            name: items
            widget: list
            summary: "{{fields.wine}} ({{fields.score}})"
            fields:
              - { label: Wine, name: wine, widget: string }
              - { label: Notes, name: notes, widget: text }
              - { label: Pairings, name: pairings, widget: text }
              - label: Score
                name: score
                widget: number
                value_type: int
                min: 0
                max: 100

  - name: reviews
    label: Winery reviews
    files:
      - label: All reviews
        name: reviews
        file: content/reviews.json
        fields:
          - label: Reviews (order shown top to bottom on the page)
            name: items
            widget: list
            summary: "{{fields.title}}"
            fields:
              - label: Winery name
                name: title
                widget: string
              - label: Region
                name: region
                widget: string
                hint: "e.g. Okanagan, Naramata"
              - label: Month
                name: month
                widget: string
                hint: "e.g. March"
              - label: Year
                name: year
                widget: string
                hint: "e.g. 2026"
              - label: Meta line (legacy, optional)
                name: meta
                widget: string
                required: false
                hint: "Used in header only if Region, Month, and Year are all empty"
              - label: Wine
                name: wine
                widget: number
                value_type: float
                min: 0
                max: 5
                step: 0.1
              - label: Service
                name: service
                widget: number
                value_type: float
                min: 0
                max: 5
                step: 0.1
              - label: Property
                name: property
                widget: number
                value_type: float
                min: 0
                max: 5
                step: 0.1
              - label: Prices
                name: prices
                widget: number
                value_type: float
                min: 0
                max: 5
                step: 0.1
              - { label: Body, name: body, widget: text }
              - label: "Photo 1"
                name: photo1
                widget: image
                required: false
                hint: "Upload JPEG/PNG/WebP image."
              - label: "Photo 2"
                name: photo2
                widget: image
                required: false
                hint: "Optional. Leave blank to hide."
              - label: "Photo 3"
                name: photo3
                widget: image
                required: false
                hint: "Optional. Leave blank to hide."
              - label: URL slug (optional)
                name: slug
                widget: string
                required: false
                hint: "Short id for anchor links; leave blank to auto-generate from title"
